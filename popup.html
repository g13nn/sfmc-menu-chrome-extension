<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SFMC Menu</title>
  <link href="popup.css" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <header id="header" class="sf-header">
      <div class="sf-header-content">
        <div class="sf-header-title">
          <svg class="header-icon slds-icon" width="16" height="16" viewBox="0 0 52 52">
            <path d="M43.8 22.4C42.3 14.4 35.4 8 27 8c-4.8 0-9.1 2.4-11.8 6.2C6.8 16.1 1 22.8 1 30.5 1 39.5 8.5 47 17.5 47h25c5.8 0 10.5-4.7 10.5-10.5 0-5.2-3.7-9.6-8.7-10.4-.2-.5-.4-1-.5-1.6 0-.7-.1-1.4-.2-2.1z"/>
          </svg>
          <h1>SFMC Menu</h1>
        </div>
        <button id="settings" class="sf-button sf-button-icon" title="Settings">
          <svg id="cog-icon" class="slds-icon" width="16" height="16" viewBox="0 0 24 24">
            <path d="M12 15.5c-1.9 0-3.5-1.6-3.5-3.5s1.6-3.5 3.5-3.5 3.5 1.6 3.5 3.5-1.6 3.5-3.5 3.5zm7.4-3.2c0-.3 0-.6-.1-.9l2.1-1.6c.2-.1.2-.4.1-.6l-2-3.5c-.1-.2-.4-.3-.6-.2l-2.5 1c-.5-.4-1-.7-1.6-.9l-.4-2.6c0-.2-.2-.4-.5-.4h-4c-.2 0-.4.2-.4.4l-.4 2.6c-.6.2-1.1.5-1.6.9l-2.5-1c-.2-.1-.5 0-.6.2l-2 3.5c-.1.2-.1.5.1.6l2.1 1.6c0 .3-.1.6-.1.9s0 .6.1.9l-2.1 1.6c-.2.1-.2.4-.1.6l2 3.5c.1.2.4.3.6.2l2.5-1c.5.4 1 .7 1.6.9l.4 2.6c0 .2.2.4.5.4h4c.2 0 .4-.2.4-.4l.4-2.6c.6-.2 1.1-.5 1.6-.9l2.5 1c.2.1.5 0 .6-.2l2-3.5c.1-.2.1-.5-.1-.6l-2.1-1.6c.1-.3.1-.6.1-.9z"/>
          </svg>
          <svg id="close-icon" class="slds-icon" width="16" height="16" viewBox="0 0 24 24" style="display: none;">
            <path d="M19 6.4L17.6 5 12 10.6 6.4 5 5 6.4 10.6 12 5 17.6 6.4 19 12 13.4 17.6 19 19 17.6 13.4 12z"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Main Content -->
    <div class="content-wrapper">
      <!-- Main Menu -->
      <main id="main-content-area">
        <ul id="main-menu" class="sf-nav">
          <li class="sf-nav-item">
            <a href="https://mc.exacttarget.com/cloud/" target="_blank" class="sf-nav-link">
              Home
            </a>
          </li>
          <li class="sf-nav-item">
            <a href="https://mc.exacttarget.com/cloud/#app/Email/Default.aspx?ks=ks%23Content" target="_blank" class="sf-nav-link">
              Content
            </a>
          </li>
          <li class="sf-nav-item">
            <a href="https://mc.exacttarget.com/cloud/#app/Email/Default.aspx?ks=ks%23Subscribers" target="_blank" class="sf-nav-link">
              Subscribers
            </a>
          </li>
          <li class="sf-nav-item">
            <a href="https://mc.exacttarget.com/cloud/#app/CloudPages/" target="_blank" class="sf-nav-link">
              Cloud Pages
            </a>
          </li>
          <li class="sf-nav-item">
            <a href="https://mc.exacttarget.com/cloud/#app/Analytics/" target="_blank" class="sf-nav-link">
              Reporting
            </a>
          </li>
          <li class="sf-nav-item">
            <a href="https://mc.exacttarget.com/cloud/#app/Automation%20Studio/AutomationStudioFuel3/" target="_blank" class="sf-nav-link">
              Automation Studio
            </a>
          </li>
          <li class="sf-nav-item">
            <a href="https://mc.exacttarget.com/cloud/#app/Journey%20Builder/%23dashboard/view/all-journeys/" target="_blank" class="sf-nav-link">
              Journey Builder
            </a>
          </li>
          <li class="sf-nav-item">
            <a href="https://mc.exacttarget.com/cloud/#app/Content%20Builder/" target="_blank" class="sf-nav-link">
              Content Builder
            </a>
          </li>
          <li class="sf-nav-item">
            <a href="https://mc.exacttarget.com/cloud/#app/Contact%20Builder/" target="_blank" class="sf-nav-link">
              Contact Builder
            </a>
          </li>
          <li class="sf-nav-item">
                        <a href="https://mc.exacttarget.com/cloud/#app/Admin/" target="_blank" class="sf-nav-link">
              Admin
            </a>
          </li>
        </ul>
      </main>

      <!-- Settings Menu -->
      <div id="settings-menu" class="hidden">
        <div class="sf-card">
          <div class="sf-card-header">
            <h3 data-i18n="editMenuItems">Edit Menu Items</h3>
          </div>
          <div class="sf-card-body">
            <ul id="sortable-options" class="sf-sortable-list">
              <!-- Menu items for reordering -->
            </ul>
          </div>
        </div>

        <div class="sf-card">
          <div class="sf-card-header">
            <h3 data-i18n="customLink">Custom Link</h3>
          </div>
          <div class="sf-card-body">
            <form id="add-link-form" class="sf-form">
              <div class="sf-form-group">
                <label for="link-name" data-i18n="linkName">Link Name</label>
                <input type="text" id="link-name" class="sf-input" data-i18n-placeholder="enterLinkName" placeholder="Enter link name" required>
              </div>
              <div class="sf-form-group">
                <label for="link-url" data-i18n="linkUrl">Link URL</label>
                <input type="url" id="link-url" class="sf-input" placeholder="https://example.com" required>
              </div>
              <button type="submit" id="add-link-button" class="sf-button sf-button-brand" data-i18n="addCustomLink">
                Add Custom Link
              </button>
            </form>
          </div>
        </div>

        <div class="sf-card">
          <div class="sf-card-header">
            <h3 data-i18n="appearance">Appearance</h3>
          </div>
          <div class="sf-card-body">
            <div class="sf-form-group">
              <label for="accent-color" data-i18n="accentColor">Accent Color</label>
              <div class="color-picker-wrapper">
                <input type="color" id="accent-color" value="#0176d3">
                <span id="color-value">#0176d3</span>
              </div>
            </div>
            <div class="sf-form-group" style="margin-top: 20px;">
              <label data-i18n="textAlignment">Text Alignment</label>
              <div class="alignment-buttons">
                <button type="button" id="align-left" class="alignment-btn active" data-alignment="left">
                  <svg width="16" height="16" viewBox="0 0 24 24">
                    <path d="M3 3h18v2H3V3zm0 4h12v2H3V7zm0 4h18v2H3v-2zm0 4h12v2H3v-2z"/>
                  </svg>
                </button>
                <button type="button" id="align-center" class="alignment-btn" data-alignment="center">
                  <svg width="16" height="16" viewBox="0 0 24 24">
                    <path d="M3 3h18v2H3V3zm3 4h12v2H6V7zm-3 4h18v2H3v-2zm3 4h12v2H6v-2z"/>
                  </svg>
                </button>
                <button type="button" id="align-right" class="alignment-btn" data-alignment="right">
                  <svg width="16" height="16" viewBox="0 0 24 24">
                    <path d="M3 3h18v2H3V3zm6 4h12v2H9V7zm-6 4h18v2H3v-2zm6 4h12v2H9v-2z"/>
                  </svg>
                </button>
              </div>
            </div>
            <div class="sf-form-group" style="margin-top: 20px;">
              <label for="text-size" data-i18n="textSize">Text Size (px)</label>
              <input type="number" id="text-size" class="sf-input" value="16" min="10" max="24" step="1">
            </div>
            <div class="sf-form-group" style="margin-top: 20px;">
              <label for="font-weight" data-i18n="fontWeight">Font Weight</label>
              <div class="font-weight-wrapper">
                <input type="range" id="font-weight" class="sf-slider" value="400" min="100" max="900" step="100">
                <span id="font-weight-value">400</span>
              </div>
            </div>
          </div>
        </div>

        <div class="sf-card">
          <div class="sf-card-header">
            <h3 data-i18n="language">Language</h3>
          </div>
          <div class="sf-card-body">
            <div class="sf-form-group">
              <label for="language-select" data-i18n="menuLanguage">Menu Language</label>
              <select id="language-select" class="sf-select">
                <option value="en">English</option>
                <option value="es">Español (Spanish)</option>
                <option value="pt">Português (Portuguese)</option>
                <option value="fr">Français (French)</option>
                <option value="de">Deutsch (German)</option>
                <option value="it">Italiano (Italian)</option>
                <option value="nl">Nederlands (Dutch)</option>
                <option value="pl">Polski (Polish)</option>
                <option value="sv">Svenska (Swedish)</option>
                <option value="da">Dansk (Danish)</option>
                <option value="no">Norsk (Norwegian)</option>
                <option value="fi">Suomi (Finnish)</option>
                <option value="ru">Русский (Russian)</option>
                <option value="ja">日本語 (Japanese)</option>
                <option value="ko">한국어 (Korean)</option>
                <option value="zh-cn">简体中文 (Chinese Simplified)</option>
                <option value="zh-tw">繁體中文 (Chinese Traditional)</option>
                <option value="ar">العربية (Arabic)</option>
                <option value="hi">हिन्दी (Hindi)</option>
                <option value="th">ไทย (Thai)</option>
              </select>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
